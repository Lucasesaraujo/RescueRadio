services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: rescueradio-api
    ports:
      - "8000:8000"
    networks:
      - rescueradio-network

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: rescueradio-web
    ports:
      - "4200:80"
    depends_on:
      - api
      - kong
    networks:
      - rescueradio-network

  kong:
    image: kong:3.6
    container_name: rescueradio-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8001:8000"
      - "8002:8001"
    depends_on:
      - api
    networks:
      - rescueradio-network

networks:
  rescueradio-network:
    driver: bridge